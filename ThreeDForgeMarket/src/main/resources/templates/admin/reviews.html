<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin reviews | 3DForgeMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="page-heading">
        <p class="eyebrow">Admin</p>
        <h1>Review moderation</h1>
    </section>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <section class="responsive-table"
             th:if="${reviews != null and !#lists.isEmpty(reviews)}">
        <table>
            <thead>
            <tr>
                <th>Product</th>
                <th>Author</th>
                <th>Rating</th>
                <th>Comment</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="review : ${reviews}">
                <td data-label="Product">
                    <a th:href="@{/products/{id}(id=${review.productId})}"
                       th:text="${review.productName}">
                        Part tray
                    </a>
                </td>

                <td data-label="Author"
                    th:text="${review.authorUsername}">
                    customer
                </td>

                <td data-label="Rating">
                    <span class="rating rating-stars">
                        <span class="sr-only"
                              th:text="|${review.rating} out of 5 stars|">
                            5 out of 5 stars
                        </span>
                        <span class="rating-star-row" aria-hidden="true">
                            <span th:each="star : ${#numbers.sequence(1, 5)}"
                                  th:class="${star <= review.rating ? 'rating-star rating-star-filled' : 'rating-star rating-star-empty'}"
                                  th:text="${star <= review.rating ? '★' : '☆'}">
                                ★
                            </span>
                        </span>
                    </span>
                </td>

                <td data-label="Comment"
                    th:text="${review.comment}">
                    Helpful product.
                </td>

                <td data-label="Date">
                    <time th:datetime="${#temporals.format(review.createdOn, 'yyyy-MM-dd''T''HH:mm')}"
                          th:text="${#temporals.format(review.createdOn, 'dd MMM yyyy')}">
                        21 Jun 2026
                    </time>
                </td>

                <td data-label="Action">
                    <form th:action="@{/admin/reviews/{id}(id=${review.id})}"
                          method="post"
                          data-confirm="Delete this review permanently?">
                        <input type="hidden" name="_method" value="delete">

                        <button class="btn btn-danger btn-small"
                                type="submit">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="empty-state"
             th:if="${reviews == null or #lists.isEmpty(reviews)}">
        <p class="eyebrow">Review moderation</p>
        <h2>No reviews submitted yet.</h2>
        <p>
            Customer reviews will appear here when they are submitted.
        </p>

        <a class="btn btn-primary"
           th:href="@{/admin/products}">
            Manage products
        </a>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
