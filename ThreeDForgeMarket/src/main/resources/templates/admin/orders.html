<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin orders | 3DForgeMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <section class="page-heading">
        <p class="eyebrow">Admin</p>
        <h1>Customer orders</h1>
    </section>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <section class="responsive-table wide-table" th:if="${orders != null and !#lists.isEmpty(orders)}">
        <table>
            <thead>
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Delivery address</th>
                <th>Note</th>
                <th>Created</th>
                <th>Status</th>
                <th>Update</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td data-label="Customer">
                    <strong th:text="${order.customer.username}">customer</strong>
                    <span class="subtle" th:text="${order.customer.email}">customer@example.com</span>
                </td>
                <td data-label="Product">
                    <a th:href="@{/products/{id}(id=${order.product.id})}" th:text="${order.product.name}">Part tray</a>
                </td>
                <td data-label="Quantity" th:text="${order.quantity}">1</td>
                <td data-label="Total" th:text="|€${#numbers.formatDecimal(order.totalPrice, 1, 2)}|">€24.00</td>
                <td data-label="Delivery address" th:text="${order.deliveryAddress}">Delivery address</td>
                <td data-label="Note" th:text="${order.customerNote != null and !#strings.isEmpty(order.customerNote) ? order.customerNote : '—'}">Customer note</td>
                <td data-label="Created" th:text="${#temporals.format(order.createdOn, 'dd MMM yyyy HH:mm')}">21 Jun 2026 10:00</td>
                <td data-label="Status">
                    <span th:class="|status-badge status-${#strings.toLowerCase(order.status.name())}|"
                          th:text="${order.status.displayName}">
                        Pending
                    </span>
                </td>
                <td data-label="Update">
                    <form class="inline-form" th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                        <label class="sr-only" th:for="|status-${order.id}|">Status</label>
                        <select th:id="|status-${order.id}|" name="status">
                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status.displayName}"
                                    th:selected="${status == order.status}">
                                Printing
                            </option>
                        </select>
                        <button class="btn btn-small" type="submit">Update</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="empty-state" th:if="${orders == null or #lists.isEmpty(orders)}">
        <h2>No customer orders</h2>
        <p>Orders will appear here after customers submit requests.</p>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
