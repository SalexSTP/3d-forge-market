<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My orders | 3DForgeMarket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <section class="page-heading">
        <p class="eyebrow">Customer orders</p>
        <h1>My orders</h1>
    </section>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <section class="responsive-table" th:if="${orders != null and !#lists.isEmpty(orders)}">
        <table>
            <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Status</th>
                <th>Created</th>
                <th>Delivery address</th>
                <th>Note</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td data-label="Product">
                    <a th:href="@{/products/{id}(id=${order.productId})}"
                       th:text="${order.productName}">
                        Desk hook
                    </a>
                </td>
                <td data-label="Quantity" th:text="${order.quantity}">2</td>
                <td data-label="Total" th:text="|€${#numbers.formatDecimal(order.totalPrice, 1, 2)}|">€36.00</td>
                <td data-label="Status">
                    <span th:class="|status-badge status-${#strings.toLowerCase(order.status.name())}|"
                          th:text="${order.status.displayName}">
                        Pending
                    </span>
                </td>
                <td data-label="Created" th:text="${#temporals.format(order.createdOn, 'dd MMM yyyy HH:mm')}">21 Jun 2026 10:00</td>
                <td data-label="Delivery address" th:text="${order.deliveryAddress}">Address</td>
                <td data-label="Note" th:text="${order.customerNote != null and !#strings.isEmpty(order.customerNote) ? order.customerNote : '—'}">No note</td>
                <td data-label="Actions">
                    <div class="order-actions">
                        <form th:if="${order.cancellable}"
                              th:action="@{/orders/{id}/cancel(id=${order.id})}"
                              method="post"
                              data-confirm="Cancel this order?">
                            <input type="hidden" name="_method" value="put">

                            <button class="btn btn-danger btn-small" type="submit">
                                Cancel
                            </button>
                        </form>

                        <form th:if="${order.deletable}"
                              th:action="@{/orders/{id}(id=${order.id})}"
                              method="post"
                              data-confirm="Delete this cancelled order from your history?">
                            <input type="hidden" name="_method" value="delete">

                            <button class="btn btn-danger btn-small" type="submit">
                                Delete
                            </button>
                        </form>

                        <span class="muted-action"
                              th:if="${!order.cancellable and !order.deletable}">
                            No actions
                        </span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="empty-state" th:if="${orders == null or #lists.isEmpty(orders)}">
        <h2>No orders yet</h2>
        <p>Browse the catalog and place your first 3D-print order.</p>
        <a class="btn btn-primary" th:href="@{/products}">Browse products</a>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
